<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI 업무도구</title>
  <style>
    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #f4f6f8;
      color: #17202a;
      font-family: Pretendard, "Noto Sans KR", "Malgun Gothic", sans-serif;
    }

    body {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
    }

    .site-header {
      position: relative;
      z-index: 10;
      background: #ffffff;
      border-bottom: 1px solid #dfe3e8;
      box-shadow: 0 2px 8px rgb(23 32 42 / 8%);
    }

    .header-inner {
      display: flex;
      align-items: center;
      gap: 28px;
      min-height: 68px;
      max-width: 1440px;
      margin: 0 auto;
      padding: 0 24px;
    }

    .brand {
      flex: 0 0 auto;
      margin: 0;
      color: #111827;
      font-size: 18px;
      font-weight: 800;
      white-space: nowrap;
    }

    .tabs {
      display: flex;
      align-self: stretch;
      gap: 4px;
      min-width: 0;
      margin-left: auto;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .tabs::-webkit-scrollbar { display: none; }

    .tab {
      position: relative;
      flex: 0 0 auto;
      min-height: 48px;
      padding: 0 18px;
      border: 0;
      background: transparent;
      color: #59636e;
      font: inherit;
      font-size: 14px;
      font-weight: 700;
      white-space: nowrap;
      cursor: pointer;
    }

    .tab::after {
      position: absolute;
      right: 18px;
      bottom: 0;
      left: 18px;
      height: 3px;
      border-radius: 3px 3px 0 0;
      background: #1368ce;
      content: "";
      opacity: 0;
      transform: scaleX(.5);
      transition: opacity .18s ease, transform .18s ease;
    }

    .tab:hover { color: #17202a; background: #f7f9fb; }
    .tab[aria-selected="true"] { color: #0c5db8; }
    .tab[aria-selected="true"]::after { opacity: 1; transform: scaleX(1); }
    .tab:focus-visible { outline: 2px solid #1368ce; outline-offset: -4px; }

    main { min-height: 0; }

    #content-frame {
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
      background: #ffffff;
    }

    @media (max-width: 760px) {
      .header-inner {
        display: block;
        min-height: 0;
        padding: 12px 0 0;
      }

      .brand { padding: 0 16px 10px; font-size: 16px; }
      .tabs { height: 46px; padding: 0 8px; }
      .tab { min-height: 46px; padding: 0 12px; font-size: 13px; }
      .tab::after { right: 12px; left: 12px; }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <h1 class="brand">AI 업무도구</h1>
      <nav class="tabs" role="tablist" aria-label="AI 업무도구 메뉴">
        <button class="tab" id="tab-proposal" type="button" role="tab" aria-selected="true" aria-controls="content-frame" data-page="proposal.html">제안서도우미</button>
        <button class="tab" id="tab-summary" type="button" role="tab" aria-selected="false" aria-controls="content-frame" data-page="index_1.html" tabindex="-1">요약서 ppt 자동화</button>
        <button class="tab" id="tab-sprint" type="button" role="tab" aria-selected="false" aria-controls="content-frame" data-page="index_2.html" tabindex="-1">30일 AI 업무전환 실행권</button>
      </nav>
    </div>
  </header>

  <main>
    <iframe id="content-frame" name="content-frame" src="proposal.html" title="제안서도우미" loading="eager"></iframe>
  </main>

  <script>
    const tabs = [...document.querySelectorAll('.tab')];
    const frame = document.getElementById('content-frame');

    function selectTab(tab) {
      tabs.forEach((item) => {
        const isActive = item === tab;
        item.setAttribute('aria-selected', String(isActive));
        item.tabIndex = isActive ? 0 : -1;
      });

      frame.src = tab.dataset.page;
      frame.title = tab.textContent.trim();
    }

    tabs.forEach((tab, index) => {
      tab.addEventListener('click', () => selectTab(tab));
      tab.addEventListener('keydown', (event) => {
        if (!['ArrowLeft', 'ArrowRight', 'Home', 'End'].includes(event.key)) return;
        event.preventDefault();

        let nextIndex = index;
        if (event.key === 'ArrowRight') nextIndex = (index + 1) % tabs.length;
        if (event.key === 'ArrowLeft') nextIndex = (index - 1 + tabs.length) % tabs.length;
        if (event.key === 'Home') nextIndex = 0;
        if (event.key === 'End') nextIndex = tabs.length - 1;

        selectTab(tabs[nextIndex]);
        tabs[nextIndex].focus();
      });
    });
  </script>
</body>
</html>
