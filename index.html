<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI 업무도구</title>
  <style>
    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #f4f6f8;
      color: #17202a;
      font-family: Pretendard, "Noto Sans KR", "Malgun Gothic", sans-serif;
    }

    body {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
    }

    .site-header {
      position: relative;
      z-index: 10;
      background: #ffffff;
      border-bottom: 1px solid #dfe3e8;
      box-shadow: 0 2px 8px rgb(23 32 42 / 8%);
    }

    .header-inner {
      display: flex;
      align-items: center;
      gap: 28px;
      min-height: 68px;
      max-width: 1440px;
      margin: 0 auto;
      padding: 0 24px;
    }

    .brand {
      flex: 0 0 auto;
      margin: 0;
      color: #111827;
      font-size: 18px;
      font-weight: 800;
      white-space: nowrap;
    }

    .tabs {
      display: flex;
      align-self: stretch;
      gap: 4px;
      min-width: 0;
      margin-left: auto;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .tabs::-webkit-scrollbar { display: none; }

    .tab {
      position: relative;
      flex: 0 0 auto;
      min-height: 48px;
      padding: 0 18px;
      border: 0;
      background: transparent;
      color: #59636e;
      font: inherit;
      font-size: 14px;
      font-weight: 700;
      white-space: nowrap;
      cursor: pointer;
    }

    .tab::after {
      position: absolute;
      right: 18px;
      bottom: 0;
      left: 18px;
      height: 3px;
      border-radius: 3px 3px 0 0;
      background: #1368ce;
      content: "";
      opacity: 0;
      transform: scaleX(.5);
      transition: opacity .18s ease, transform .18s ease;
    }

    .tab:hover { color: #17202a; background: #f7f9fb; }
    .tab[aria-selected="true"] { color: #0c5db8; }
    .tab[aria-selected="true"]::after { opacity: 1; transform: scaleX(1); }
    .tab:focus-visible { outline: 2px solid #1368ce; outline-offset: -4px; }

    main { min-height: 0; }

    #content-frame {
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
      background: #ffffff;
    }

    .video-trigger {
      position: fixed;
      right: 24px;
      bottom: 24px;
      z-index: 30;
      display: inline-flex;
      align-items: center;
      gap: 9px;
      min-height: 48px;
      padding: 0 20px;
      border: 0;
      border-radius: 8px;
      background: #1368ce;
      box-shadow: 0 8px 22px rgb(19 104 206 / 32%);
      color: #ffffff;
      font: inherit;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
    }

    .video-trigger:hover { background: #0c5db8; }
    .video-trigger:focus-visible { outline: 3px solid #7db7f5; outline-offset: 3px; }

    .play-icon {
      width: 0;
      height: 0;
      border-top: 6px solid transparent;
      border-bottom: 6px solid transparent;
      border-left: 9px solid currentColor;
    }

    .video-dialog {
      width: min(960px, calc(100vw - 32px));
      max-width: none;
      padding: 0;
      border: 0;
      border-radius: 8px;
      overflow: hidden;
      background: #0b0d10;
      box-shadow: 0 24px 70px rgb(0 0 0 / 45%);
    }

    .video-dialog::backdrop { background: rgb(0 0 0 / 72%); }

    .video-dialog-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 52px;
      padding: 0 12px 0 18px;
      background: #ffffff;
    }

    .video-dialog-title { margin: 0; font-size: 16px; }

    .video-close {
      display: grid;
      width: 36px;
      height: 36px;
      padding: 0;
      border: 0;
      border-radius: 6px;
      background: transparent;
      color: #2f3944;
      font-size: 27px;
      line-height: 1;
      place-items: center;
      cursor: pointer;
    }

    .video-close:hover { background: #eef1f4; }

    .video-player {
      display: block;
      width: 100%;
      max-height: calc(100vh - 110px);
      aspect-ratio: 16 / 9;
      background: #000000;
    }

    @media (max-width: 760px) {
      .header-inner {
        display: block;
        min-height: 0;
        padding: 12px 0 0;
      }

      .brand { padding: 0 16px 10px; font-size: 16px; }
      .tabs { height: 46px; padding: 0 8px; }
      .tab { min-height: 46px; padding: 0 12px; font-size: 13px; }
      .tab::after { right: 12px; left: 12px; }
      .video-trigger { right: 16px; bottom: 16px; min-height: 44px; padding: 0 16px; }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <h1 class="brand">AI 업무도구</h1>
      <nav class="tabs" role="tablist" aria-label="AI 업무도구 메뉴">
        <button class="tab" id="tab-proposal" type="button" role="tab" aria-selected="true" aria-controls="content-frame" data-page="proposal.html">제안서도우미</button>
        <button class="tab" id="tab-summary" type="button" role="tab" aria-selected="false" aria-controls="content-frame" data-page="https://briefing-iota-virid.vercel.app/index.html" tabindex="-1">요약서 ppt 자동화</button>
        <button class="tab" id="tab-sprint" type="button" role="tab" aria-selected="false" aria-controls="content-frame" data-page="index_2.html" tabindex="-1">30일 AI 업무전환 실행권</button>
      </nav>
    </div>
  </header>

  <main>
    <iframe id="content-frame" name="content-frame" src="proposal.html" title="제안서도우미" loading="eager"></iframe>
  </main>

  <button class="video-trigger" id="video-trigger" type="button" aria-haspopup="dialog">
    <span class="play-icon" aria-hidden="true"></span>
    영상보기
  </button>

  <dialog class="video-dialog" id="video-dialog" aria-labelledby="video-title">
    <div class="video-dialog-header">
      <h2 class="video-dialog-title" id="video-title">영상보기</h2>
      <button class="video-close" id="video-close" type="button" aria-label="영상 닫기">&times;</button>
    </div>
    <video class="video-player" id="video-player" controls playsinline preload="metadata">
      <source src="https://d8j0ntlcm91z4.cloudfront.net/user_3EMOHy5MCKva1uxqxghVVcqU6Dl/hf_20260710_045911_e75c6b6d-01e3-45b5-95a6-ff60c4047a3a.mp4" type="video/mp4">
      브라우저가 동영상 재생을 지원하지 않습니다.
    </video>
  </dialog>

  <script>
    const tabs = [...document.querySelectorAll('.tab')];
    const frame = document.getElementById('content-frame');
    const videoTrigger = document.getElementById('video-trigger');
    const videoDialog = document.getElementById('video-dialog');
    const videoClose = document.getElementById('video-close');
    const videoPlayer = document.getElementById('video-player');

    function selectTab(tab) {
      tabs.forEach((item) => {
        const isActive = item === tab;
        item.setAttribute('aria-selected', String(isActive));
        item.tabIndex = isActive ? 0 : -1;
      });

      frame.src = tab.dataset.page;
      frame.title = tab.textContent.trim();
    }

    tabs.forEach((tab, index) => {
      tab.addEventListener('click', () => selectTab(tab));
      tab.addEventListener('keydown', (event) => {
        if (!['ArrowLeft', 'ArrowRight', 'Home', 'End'].includes(event.key)) return;
        event.preventDefault();

        let nextIndex = index;
        if (event.key === 'ArrowRight') nextIndex = (index + 1) % tabs.length;
        if (event.key === 'ArrowLeft') nextIndex = (index - 1 + tabs.length) % tabs.length;
        if (event.key === 'Home') nextIndex = 0;
        if (event.key === 'End') nextIndex = tabs.length - 1;

        selectTab(tabs[nextIndex]);
        tabs[nextIndex].focus();
      });
    });

    videoTrigger.addEventListener('click', () => videoDialog.showModal());
    videoClose.addEventListener('click', () => videoDialog.close());
    videoDialog.addEventListener('click', (event) => {
      if (event.target === videoDialog) videoDialog.close();
    });
    videoDialog.addEventListener('close', () => {
      videoPlayer.pause();
      videoPlayer.currentTime = 0;
    });
  </script>
</body>
</html>
